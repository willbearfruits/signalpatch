  <path d="M 66 118 C 100 205, 150 225, 190 182" fill="none" stroke="#ffd9a0" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- knob -->
  <circle cx="150" cy="118" r="17" fill="#11161a" stroke="#39434b" stroke-width="3"/>
  <line x1="150" y1="118" x2="141" y2="104" stroke="#efeadd" stroke-width="5" stroke-linecap="round"/>
