  </defs>
  <!-- module face plate -->
  <rect x="20" y="16" width="216" height="224" rx="22" fill="url(#panel)" stroke="#0c0f12" stroke-width="4"/>
  <!-- rails -->
  <rect x="24" y="20" width="208" height="22" rx="18" fill="#11161a"/>
  <rect x="24" y="214" width="208" height="22" rx="18" fill="#11161a"/>
  <circle cx="44" cy="31" r="5" fill="#39434b"/>
  <circle cx="212" cy="31" r="5" fill="#39434b"/>
  <circle cx="44" cy="225" r="5" fill="#39434b"/>
  <circle cx="212" cy="225" r="5" fill="#39434b"/>
  <!-- header strip -->
  <rect x="24" y="44" width="208" height="34" fill="url(#header)"/>
  <circle cx="205" cy="61" r="7" fill="#92d95e"/>
  <!-- jacks -->
  <circle cx="66" cy="118" r="20" fill="#11161a" stroke="#4fd8c4" stroke-width="6"/>
  <circle cx="66" cy="118" r="6" fill="#4fd8c4"/>
  <circle cx="190" cy="182" r="20" fill="#11161a" stroke="#b48cff" stroke-width="6"/>
  <circle cx="190" cy="182" r="6" fill="#b48cff"/>
