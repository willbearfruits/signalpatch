name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux (GCC, tests)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libasound2-dev libjack-jackd2-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxext-dev \
            libfreetype6-dev libfontconfig1-dev
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DSIGNALPATCH_NAM_CORE_DIR=/nonexistent
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows:
    name: Windows (MSVC, tests)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        # No explicit -G: use whatever Visual Studio the runner image ships.
        run: >
          cmake -S . -B build -A x64
          -DSIGNALPATCH_NAM_CORE_DIR=C:/nonexistent
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
